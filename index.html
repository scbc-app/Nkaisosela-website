    .page-enter {
      animation: pageReveal 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      will-change: opacity, transform;
    }

    @keyframes pageReveal {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .image-loading {
      background: linear-gradient(110deg, #f1f5f9 8%, #f8fafc 18%, #f1f5f9 33%);
      background-size: 200% 100%;
      animation: shine 1.5s linear infinite;
    }

    @keyframes shine {
      to {
        background-position-x: -200%;
      }
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Custom tracking for industrial headers */
    .tracking-tightest { letter-spacing: -0.04em; }
    .tracking-widest-plus { letter-spacing: 0.25em; }

    /* Print Styling for PDF Export */
    @media print {
      body * { visibility: hidden; background: white !important; }
      #print-area, #print-area * { visibility: visible; }
      #print-area { 
        position: absolute; 
        left: 0; 
        top: 0; 
        width: 100%; 
        padding: 40px !important;
        background: white !important;
      }
      .no-print { display: none !important; }
      @page { margin: 0; }
    }
  </style>
